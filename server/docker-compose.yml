services:
  db:
    image: postgres:16-alpine
    container_name: smartinv-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartinv}
      POSTGRES_USER: ${POSTGRES_USER:-smartinv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartinv}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartinv} -d ${POSTGRES_DB:-smartinv}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: smartinv-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartinv-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-smartinv-dev-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DB_ENGINE: django.db.backends.postgresql
      POSTGRES_DB: ${POSTGRES_DB:-smartinv}
      POSTGRES_USER: ${POSTGRES_USER:-smartinv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartinv}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./app:/app
      - media_data:/app/media
    ports:
      - "8000:8000"

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartinv-celery-llm
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-smartinv-dev-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DB_ENGINE: django.db.backends.postgresql
      POSTGRES_DB: ${POSTGRES_DB:-smartinv}
      POSTGRES_USER: ${POSTGRES_USER:-smartinv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartinv}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    command: ["celery", "-A", "smartinv", "worker", "-Q", "llm,celery", "-l", "INFO", "--concurrency", "2"]
    volumes:
      - ./app:/app
      - media_data:/app/media

  ml-worker:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: smartinv-ml-vision
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-smartinv-dev-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DB_ENGINE: django.db.backends.postgresql
      POSTGRES_DB: ${POSTGRES_DB:-smartinv}
      POSTGRES_USER: ${POSTGRES_USER:-smartinv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartinv}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    command: ["celery", "-A", "smartinv", "worker", "-Q", "vision", "-l", "INFO", "--concurrency", "1"]
    volumes:
      - ./app:/app
      - media_data:/app/media

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: smartinv-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@smartinv.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
  media_data:
