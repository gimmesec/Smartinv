services:
  db:
    image: postgres:16-alpine
    container_name: smartinv-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartinv}
      POSTGRES_USER: ${POSTGRES_USER:-smartinv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartinv}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartinv} -d ${POSTGRES_DB:-smartinv}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartinv-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-smartinv-dev-secret-key}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DB_ENGINE: django.db.backends.postgresql
      POSTGRES_DB: ${POSTGRES_DB:-smartinv}
      POSTGRES_USER: ${POSTGRES_USER:-smartinv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartinv}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./app:/app
      - media_data:/app/media
    ports:
      - "8000:8000"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: smartinv-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@smartinv.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
  media_data:
